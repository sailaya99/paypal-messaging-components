<!DOCTYPE html>
<html lang="en">
    <head>
        <title>V2 Content Samples</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                background: #f4f6f8;
                color: #1f2a33;
                font: 14px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            }

            main {
                width: min(1280px, calc(100vw - 32px));
                margin: 24px auto;
            }

            h1,
            h2,
            h3,
            p {
                margin: 0;
            }

            h1 {
                font-size: 24px;
            }

            h2 {
                font-size: 16px;
            }

            h3 {
                font-size: 13px;
            }

            p,
            .muted {
                color: #5f6f7b;
            }

            button,
            select {
                min-height: 36px;
                border: 1px solid #c9d2dc;
                border-radius: 4px;
                background: #ffffff;
                color: #1f2a33;
                font: inherit;
            }

            button {
                cursor: pointer;
                padding: 7px 12px;
                font-weight: 700;
            }

            button.primary {
                border-color: #0070ba;
                background: #0070ba;
                color: #ffffff;
            }

            label {
                display: grid;
                gap: 6px;
                color: #5f6f7b;
                font-size: 12px;
                font-weight: 700;
            }

            select {
                width: 100%;
                padding: 7px 9px;
            }

            code,
            pre {
                font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            }

            pre {
                overflow: auto;
                max-height: 260px;
                margin: 0;
                padding: 12px;
                border-radius: 4px;
                background: #101820;
                color: #d8e2ea;
                white-space: pre-wrap;
            }

            .intro {
                display: grid;
                gap: 6px;
                margin-bottom: 16px;
            }

            .panel {
                border: 1px solid #d6dee6;
                border-radius: 6px;
                background: #ffffff;
            }

            .panel-header,
            .panel-body {
                padding: 14px;
            }

            .panel-header {
                display: flex;
                gap: 12px;
                align-items: center;
                justify-content: space-between;
                border-bottom: 1px solid #d6dee6;
            }

            .controls {
                display: grid;
                grid-template-columns: repeat(4, minmax(0, 1fr)) auto;
                gap: 12px;
                align-items: end;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 12px;
            }

            .card {
                display: grid;
                gap: 10px;
                border: 1px solid #d6dee6;
                border-radius: 6px;
                background: #ffffff;
                padding: 12px;
            }

            .meta {
                display: grid;
                gap: 4px;
                min-height: 54px;
            }

            .tags {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }

            .tag {
                display: inline-flex;
                min-height: 22px;
                align-items: center;
                border: 1px solid #d6dee6;
                border-radius: 4px;
                padding: 2px 6px;
                background: #f7f9fb;
                color: #52616d;
                font-size: 12px;
                line-height: 1.2;
            }

            .preview {
                min-height: 62px;
                padding: 14px;
                border: 1px dashed #c9d2dc;
                border-radius: 4px;
                background: #fbfcfd;
            }

            .preview.dark {
                background: #22313f;
                border-color: #475867;
            }

            .message {
                min-height: 34px;
            }

            .status {
                min-height: 20px;
                color: #5f6f7b;
                font-size: 12px;
            }

            .status.pass {
                color: #18794e;
            }

            .status.fail {
                color: #b42318;
            }

            .actions {
                display: flex;
                gap: 8px;
            }

            .log-panel {
                margin-top: 16px;
            }

            @media (max-width: 940px) {
                .controls {
                    grid-template-columns: 1fr 1fr;
                }

                .actions {
                    grid-column: 1 / -1;
                }
            }

            @media (max-width: 640px) {
                .controls {
                    grid-template-columns: 1fr;
                }

                .panel-header {
                    align-items: flex-start;
                    flex-direction: column;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <section class="intro">
                <h1>V2 Content Samples</h1>
                <p>
                    Requires <code>npm run dev</code>. This page loads <code>/sdk/js</code> and sends
                    <code>features=render-v2-message</code> so the local smart/message route uses the dev-built
                    <code>src/server/v2</code> render bundle.
                </p>
            </section>

            <section class="panel">
                <div class="panel-header">
                    <h2>Controls</h2>
                    <span id="summary" class="muted"></span>
                </div>
                <div class="panel-body controls">
                    <label>
                        Sample
                        <select id="sample"></select>
                    </label>
                    <label>
                        Compare
                        <select id="compare">
                            <option value="requested">Requested sample styles</option>
                            <option value="logo-type">style.logo.type</option>
                            <option value="logo-position">style.logo.position</option>
                            <option value="text-color">style.text.color</option>
                        </select>
                    </label>
                    <label>
                        Text size
                        <select id="size">
                            <option value="12">12px</option>
                            <option value="14" selected>14px</option>
                            <option value="16">16px</option>
                        </select>
                    </label>
                    <label>
                        Text align
                        <select id="align">
                            <option value="left" selected>Left</option>
                            <option value="center">Center</option>
                            <option value="right">Right</option>
                        </select>
                    </label>
                    <div class="actions">
                        <button id="render" class="primary" type="button">Render</button>
                        <button id="clear" type="button">Clear</button>
                    </div>
                </div>
            </section>

            <section class="panel" style="margin-top: 16px">
                <div class="panel-header">
                    <h2>Rendered Messages</h2>
                    <span class="muted">All cards render through <code>paypal.Messages(...).render(...)</code>.</span>
                </div>
                <div class="panel-body">
                    <div id="grid" class="grid"></div>
                </div>
            </section>

            <section class="panel log-panel">
                <div class="panel-header">
                    <h2>Evidence Log</h2>
                </div>
                <div class="panel-body">
                    <pre id="log"></pre>
                </div>
            </section>
        </main>

        <script>
            const samples = [
                {
                    id: 'V2_DE_PLP1_SQ_NON_INLINE',
                    label: 'DE PLP1_SQ non-inline',
                    account: 'DEV000DEPI30Q',
                    buyerCountry: 'DE',
                    currency: 'EUR',
                    amount: 100,
                    expectedText: 'Bezahlen Sie nach 30 Tagen.',
                    actionText: 'Mehr erfahren',
                    requestedStyle: {
                        logo: { type: 'primary', position: 'left' },
                        text: { color: 'black' }
                    }
                },
                {
                    id: 'V2_DE_PLP1_SQ_INLINE',
                    label: 'DE PLP1_SQ inline',
                    account: 'DEV000DEPI30Q',
                    buyerCountry: 'DE',
                    currency: 'EUR',
                    amount: 100,
                    expectedText: 'Bezahlen Sie nach 30 Tagen mit',
                    actionText: '',
                    requestedStyle: {
                        logo: { type: 'inline', position: 'left' },
                        text: { color: 'black' }
                    }
                },
                {
                    id: 'V2_US_PLLT_MQ_GZ_INLINE_MONTHLY',
                    label: 'US PLLT_MQ_GZ inline monthly',
                    account: 'DEV00USLTMQGZ',
                    buyerCountry: 'US',
                    currency: 'USD',
                    amount: 1000,
                    expectedText: 'As low as $23.84/mo with',
                    actionText: 'Learn more',
                    requestedStyle: {
                        logo: { type: 'inline', position: 'left' },
                        text: { color: 'black' }
                    }
                },
                {
                    id: 'V2_US_PPCNI_SQ_PAYPAL_CREDIT',
                    label: 'US PPCNI_SQ PayPal Credit',
                    account: 'DEV0000000NIQ',
                    buyerCountry: 'US',
                    currency: 'USD',
                    amount: 600,
                    expectedText: 'No Interest if paid in full in 6 months.',
                    actionText: 'Learn more',
                    requestedStyle: {
                        logo: { type: 'primary', position: 'left' },
                        text: { color: 'black' }
                    }
                }
            ];

            const comparisonValues = {
                requested: [null],
                'logo-type': ['primary', 'alternative', 'inline', 'none'],
                'logo-position': ['left', 'right', 'top'],
                'text-color': ['black', 'white', 'monochrome', 'grayscale']
            };

            const state = {
                sdkLoaded: false,
                entries: []
            };

            const elements = {
                sample: document.getElementById('sample'),
                compare: document.getElementById('compare'),
                size: document.getElementById('size'),
                align: document.getElementById('align'),
                grid: document.getElementById('grid'),
                log: document.getElementById('log'),
                summary: document.getElementById('summary')
            };

            window.__MESSAGING_GLOBALS__ = window.__MESSAGING_GLOBALS__ || { merchantProfile: {} };
            window.__FUNDING_ELIGIBILITY__ = window.__FUNDING_ELIGIBILITY__ || { paylater: {} };

            function setupSampleOptions() {
                const all = document.createElement('option');
                all.value = 'all';
                all.textContent = 'All requested samples';
                elements.sample.appendChild(all);

                samples.forEach(sample => {
                    const option = document.createElement('option');
                    option.value = sample.id;
                    option.textContent = sample.label;
                    elements.sample.appendChild(option);
                });
            }

            function log(label, data) {
                state.entries.push({ at: new Date().toISOString(), label, data });
                elements.log.textContent = state.entries
                    .map(entry => `${entry.at} ${entry.label}\n${JSON.stringify(entry.data, null, 2)}`)
                    .join('\n\n');
                elements.log.scrollTop = elements.log.scrollHeight;
            }

            function loadSdk() {
                if (state.sdkLoaded && window.paypal) {
                    return Promise.resolve();
                }

                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = '/sdk/js?client-id=DEV_US_MULTI&components=messages&currency=USD&debug=true';
                    script.onload = () => {
                        state.sdkLoaded = true;
                        log('sdk loaded', { keys: Object.keys(window.paypal || {}) });
                        resolve();
                    };
                    script.onerror = () => reject(new Error(`Failed to load ${script.src}`));
                    document.head.appendChild(script);
                });
            }

            function getSelectedSamples() {
                if (elements.sample.value === 'all') {
                    return samples;
                }

                return samples.filter(sample => sample.id === elements.sample.value);
            }

            function buildStyle(sample, compareMode, value) {
                const style = {
                    layout: 'text',
                    logo: { ...sample.requestedStyle.logo },
                    text: {
                        ...sample.requestedStyle.text,
                        size: Number(elements.size.value),
                        align: elements.align.value
                    }
                };

                if (compareMode === 'logo-type') {
                    style.logo.type = value;
                }

                if (compareMode === 'logo-position') {
                    style.logo.type = 'primary';
                    style.logo.position = value;
                }

                if (compareMode === 'text-color') {
                    style.text.color = value;
                }

                return style;
            }

            function createCard({ sample, compareMode, value, style }) {
                const card = document.createElement('article');
                const messageId = `message-${sample.id}-${compareMode}-${value || 'requested'}`.toLowerCase();
                const color = style.text.color;

                card.className = 'card';
                card.innerHTML = `
                    <div class="meta">
                        <h3>${sample.label}</h3>
                        <div class="tags">
                            <span class="tag">${sample.id}</span>
                            <span class="tag">logo.type: ${style.logo.type}</span>
                            <span class="tag">logo.position: ${style.logo.position}</span>
                            <span class="tag">text.color: ${style.text.color}</span>
                        </div>
                    </div>
                    <div class="preview ${color === 'white' ? 'dark' : ''}">
                        <div id="${messageId}" class="message" data-pp-message></div>
                    </div>
                    <div class="status" data-status>Waiting to render...</div>
                `;

                elements.grid.appendChild(card);
                return {
                    card,
                    container: card.querySelector(`#${messageId}`),
                    status: card.querySelector('[data-status]')
                };
            }

            function inspectCard({ sample, status, container }) {
                const iframe = container.querySelector('iframe');
                if (!iframe) {
                    status.className = 'status fail';
                    status.textContent = 'No iframe found.';
                    return;
                }

                try {
                    const doc = iframe.contentDocument;
                    const bodyText = doc.body.innerText.trim();
                    const hasV2Root = Boolean(doc.querySelector('.pp-message'));
                    const hasExpectedText = bodyText.includes(sample.expectedText);
                    const hasExpectedAction = !sample.actionText || bodyText.includes(sample.actionText);
                    const passed = hasV2Root && hasExpectedText && hasExpectedAction;

                    status.className = `status ${passed ? 'pass' : 'fail'}`;
                    status.textContent = passed
                        ? 'Rendered v2 markup with expected sample content.'
                        : 'Rendered, but expected sample content was not found.';

                    log('inspect', {
                        sample: sample.id,
                        hasV2Root,
                        hasExpectedText,
                        hasExpectedAction,
                        bodyText
                    });
                } catch (err) {
                    status.className = 'status fail';
                    status.textContent = `Could not inspect iframe DOM: ${err.message}`;
                    log('inspect error', { sample: sample.id, message: err.message });
                }
            }

            async function renderCard({ sample, compareMode, value }) {
                const style = buildStyle(sample, compareMode, value);
                const { container, status } = createCard({ sample, compareMode, value, style });
                const options = {
                    account: sample.account,
                    amount: sample.amount,
                    currency: sample.currency,
                    buyerCountry: sample.buyerCountry,
                    pageType: 'product',
                    channel: sample.id,
                    features: 'render-v2-message',
                    style,
                    onRender: event => log('onRender', { sample: sample.id, meta: event.meta })
                };

                log('render requested', { sample: sample.id, compareMode, value, options });
                await window.paypal.Messages(options).render(container);
                window.setTimeout(() => inspectCard({ sample, status, container }), 900);
            }

            async function renderSamples() {
                elements.grid.innerHTML = '';
                elements.summary.textContent = 'Rendering...';
                await loadSdk();

                const selectedSamples = getSelectedSamples();
                const compareMode = elements.compare.value;
                const values = comparisonValues[compareMode];
                const jobs = [];

                selectedSamples.forEach(sample => {
                    values.forEach(value => {
                        jobs.push(renderCard({ sample, compareMode, value }));
                    });
                });

                await Promise.all(jobs);
                elements.summary.textContent = `${jobs.length} render${jobs.length === 1 ? '' : 's'} requested`;
            }

            function clear() {
                elements.grid.innerHTML = '';
                elements.log.textContent = '';
                elements.summary.textContent = '';
                state.entries = [];
            }

            document.getElementById('render').addEventListener('click', () => {
                renderSamples().catch(err => {
                    elements.summary.textContent = err.message;
                    log('render error', { message: err.message });
                });
            });
            document.getElementById('clear').addEventListener('click', clear);
            setupSampleOptions();
            renderSamples();
        </script>
    </body>
</html>
